<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Offline · CourierFlow</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      background: #0b5d5e; color: #fff; text-align: center; padding: 24px;
    }
    .card { max-width: 360px; }
    .logo {
      width: 72px; height: 72px; margin: 0 auto 20px; border-radius: 18px;
      background: rgba(255,255,255,0.12); display: flex; align-items: center; justify-content: center;
    }
    h1 { font-size: 22px; font-weight: 800; margin-bottom: 10px; }
    p { font-size: 14px; line-height: 1.6; opacity: 0.85; margin-bottom: 22px; }
    button {
      background: #fff; color: #0b5d5e; border: 0; border-radius: 10px;
      padding: 12px 22px; font-size: 14px; font-weight: 700; cursor: pointer;
    }
    .hint { margin-top: 18px; font-size: 12px; opacity: 0.7; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <svg width="40" height="40" viewBox="0 0 64 64" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
        <path d="M11 38V20a3 3 0 0 1 3-3h18v21M34 24h12l7 8v6H34"/>
        <circle cx="21" cy="42" r="5"/><circle cx="45" cy="42" r="5"/>
      </svg>
    </div>
    <h1>You're offline</h1>
    <p>No internet connection right now. Your GPS points are saved and will sync automatically once you're back online.</p>
    <button onclick="location.reload()">Try again</button>
    <p class="hint">CourierFlow · Tanzania</p>
  </div>
</body>
</html>
